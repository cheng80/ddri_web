openapi: 3.0.3
info:
  title: DDRI API
  description: 비로그인 조회형 DDRI 웹서비스 API
  version: 1.0.0

servers:
  - url: http://localhost:8000
    description: 로컬 개발 서버

tags:
  - name: default
    description: 기본 엔드포인트
  - name: ddri-user
    description: 사용자 페이지 API
  - name: ddri-admin
    description: 관리자 페이지 API
  - name: ddri-stations
    description: 스테이션 기본 정보 API
  - name: weather
    description: Open-Meteo 기반 날씨 API

paths:
  /:
    get:
      tags: [default]
      summary: API 정보
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string }
                  status: { type: string }
                  version: { type: string }

  /health:
    get:
      tags: [default]
      summary: 헬스 체크
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  message: { type: string }

  /v1/user/stations/nearby:
    get:
      tags: [ddri-user]
      summary: 근처 대여소 조회
      description: 위치 기준 주변 대여소와 화면용 날씨 정보를 함께 반환할 수 있다.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            example: 37.5012
        - name: lng
          in: query
          required: true
          schema:
            type: number
            example: 127.0396
        - name: target_datetime
          in: query
          required: true
          schema:
            type: string
            example: "2026-03-20T18:00:00+09:00"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 50
        - name: radius_m
          in: query
          required: false
          schema:
            type: integer
            nullable: true
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NearbyStationsResponse"

  /v1/admin/stations/risk:
    get:
      tags: [ddri-admin]
      summary: 관리자 위험 대여소 조회
      parameters:
        - name: base_datetime
          in: query
          required: true
          schema:
            type: string
            example: "2026-03-20T18:00:00+09:00"
        - name: urgent_only
          in: query
          required: false
          schema:
            type: boolean
            nullable: true
        - name: district_name
          in: query
          required: false
          schema:
            type: string
            example: "역삼동"
        - name: cluster_code
          in: query
          required: false
          schema:
            type: string
            example: "cluster00"
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            enum: [risk_score, reallocation_priority, stock_gap]
            default: risk_score
        - name: sort_order
          in: query
          required: false
          schema:
            type: string
            enum: [asc, desc]
            default: desc
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskStationsResponse"

  /v1/stations:
    get:
      tags: [ddri-stations]
      summary: 스테이션 기본 정보 조회
      parameters:
        - name: district_name
          in: query
          required: false
          schema:
            type: string
        - name: cluster_code
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StationsListResponse"

  /v1/weather/direct:
    get:
      tags: [weather]
      summary: 주간 날씨 조회
      description: Open-Meteo에서 오늘 포함 7일 일별 예보를 조회한다.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            example: 37.5665
        - name: lon
          in: query
          required: true
          schema:
            type: number
            example: 126.978
        - name: start_date
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2026-03-20"
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherForecastResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /v1/weather/direct/single:
    get:
      tags: [weather]
      summary: 특정 날짜 날씨 조회
      description: 선택 날짜 또는 기준 시각의 상세 날씨를 조회한다. 과거 날짜는 허용하지 않으며 현재 시점부터 7일 이내 사용을 권장한다.
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
            example: 37.5665
        - name: lon
          in: query
          required: true
          schema:
            type: number
            example: 126.978
        - name: target_date
          in: query
          required: false
          schema:
            type: string
            format: date
            example: "2026-03-20"
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeatherSingleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

components:
  schemas:
    NearbyStationsResponse:
      type: object
      properties:
        target_datetime:
          type: string
        user_location:
          type: object
          properties:
            lat: { type: number }
            lng: { type: number }
        weather:
          $ref: "#/components/schemas/WeatherBundle"
        items:
          type: array
          items:
            $ref: "#/components/schemas/StationNearbyItem"
        exceptions:
          type: array
          items:
            $ref: "#/components/schemas/ExceptionItem"

    RiskStationsResponse:
      type: object
      properties:
        base_datetime:
          type: string
        weather:
          $ref: "#/components/schemas/WeatherBundle"
        summary:
          $ref: "#/components/schemas/RiskSummary"
        items:
          type: array
          items:
            $ref: "#/components/schemas/StationRiskItem"
        exceptions:
          type: array
          items:
            $ref: "#/components/schemas/ExceptionItem"

    RiskSummary:
      type: object
      properties:
        total_count: { type: integer }
        risk_count: { type: integer }
        exception_count: { type: integer }
        avg_risk_score: { type: number }

    StationNearbyItem:
      type: object
      properties:
        station_id: { type: integer }
        station_name: { type: string }
        address: { type: string }
        latitude: { type: number }
        longitude: { type: number }
        distance_m: { type: number }
        current_bike_stock: { type: number }
        predicted_rental_count: { type: number }
        predicted_remaining_bikes: { type: number }
        bike_availability_flag: { type: boolean }
        availability_level:
          type: string
          enum: [sufficient, normal, low]
        operational_status: { type: string }

    StationRiskItem:
      type: object
      properties:
        station_id: { type: integer }
        station_name: { type: string }
        district_name: { type: string }
        cluster_code: { type: string }
        current_bike_stock: { type: number }
        predicted_demand: { type: number }
        stock_gap: { type: number }
        risk_score: { type: number }
        reallocation_priority: { type: integer }
        operational_status: { type: string }

    StationsListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/StationMasterItem"
        total_count: { type: integer }

    StationMasterItem:
      type: object
      properties:
        station_id: { type: integer }
        api_station_id: { type: string }
        station_name: { type: string }
        district_name: { type: string }
        address: { type: string }
        latitude: { type: number }
        longitude: { type: number }
        cluster_code: { type: string }
        operational_status: { type: string }

    WeatherBundle:
      type: object
      properties:
        weekly_forecast:
          type: array
          items:
            $ref: "#/components/schemas/WeatherDayItem"
        selected_forecast:
          $ref: "#/components/schemas/WeatherDayItem"

    WeatherForecastResponse:
      type: object
      properties:
        results:
          type: array
          items:
            $ref: "#/components/schemas/WeatherDayItem"

    WeatherSingleResponse:
      type: object
      properties:
        result:
          $ref: "#/components/schemas/WeatherDayItem"

    WeatherDayItem:
      type: object
      properties:
        weather_datetime: { type: string }
        weather_type: { type: string }
        weather_low: { type: number }
        weather_high: { type: number }
        icon_url: { type: string }

    ExceptionItem:
      type: object
      properties:
        station_id: { type: integer }
        reason: { type: string }

    ErrorResponse:
      type: object
      properties:
        result: { type: string, example: "Error" }
        errorMsg: { type: string }
        traceback: { type: string }

  responses:
    BadRequest:
      description: 파라미터 오류
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
